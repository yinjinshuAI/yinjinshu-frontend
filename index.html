<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自动AI工作机器人 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#7B61FF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .chat-bubble {
                @apply rounded-2xl p-4 max-w-[80%] shadow-sm;
            }
            .user-bubble {
                @apply bg-primary text-white ml-auto;
            }
            .ai-bubble {
                @apply bg-gray-100 text-gray-800 mr-auto;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">全自动AI工作机器人 2.0</h1>
            <p class="text-gray-500 text-lg">24小时自动运行 · 股票交易 · 跨境运营 · 自主学习</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center mr-3">
                        <i class="fa fa-line-chart text-primary text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-lg text-gray-800">股票全自动交易</h3>
                    </div>
                </div>
                <p class="text-sm text-success mt-2">已就绪</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center mr-3">
                        <i class="fa fa-globe text-secondary text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-lg text-gray-800">跨境独立站运营</h3>
                    </div>
                </div>
                <p class="text-sm text-success mt-2">已就绪</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 rounded-lg bg-success/10 flex items-center justify-center mr-3">
                        <i class="fa fa-graduation-cap text-success text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-lg text-gray-800">自主学习进化</h3>
                    </div>
                </div>
                <p class="text-sm text-success mt-2">已就绪</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-6">
            <div class="flex items-center mb-4">
                <div class="w-3 h-3 rounded-full bg-green-500 mr-2 animate-pulse"></div>
                <span class="text-sm text-gray-600">AI助手在线 <span id="backend-status" class="text-green-500">已直连DeepSeek API</span></span>
            </div>
            
            <div id="chat-messages" class="h-96 overflow-y-auto mb-4 space-y-4 p-4 bg-gray-50 rounded-xl">
                <div class="flex items-start space-x-3">
                    <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white">
                        <i class="fa fa-robot"></i>
                    </div>
                    <div class="chat-bubble ai-bubble">
                        <p>你好！我是你的全自动AI工作机器人，直接输入指令，我会自动执行任务！</p>
                    </div>
                </div>
            </div>

            <div class="flex space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="输入你的指令..."
                    class="flex-1 px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 text-lg"
                >
                <button id="send-btn" class="px-8 py-3 bg-primary text-white rounded-2xl hover:bg-primary/90">
                    <i class="fa fa-paper-plane"></i> 发送
                </button>
            </div>
        </div>
    </div>

    <script>
        // ✅ 你的DeepSeek API Key，已经填好了
        const DEEPSEEK_API_KEY = "sk-d3b05816b737475ca0fcf62d836d8d10";
        const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";

        // 模块配置
        const MODULES = {
            "stock": {
                "name": "股票全自动交易",
                "prompt": "你是一个专业的全自动股票交易AI，帮用户完成：1. 实时市场调研 2. 技术面+基本面选股 3. 交易时机分析 4. 持仓监控 5. 止盈止损提醒。你可以调用股票API获取实时数据，自动执行交易策略。"
            },
            "cross": {
                "name": "跨境独立站运营",
                "prompt": "你是一个专业的全自动跨境电商AI，帮用户完成：1. 独立站建站 2. 爆款选品调研 3. 产品上架优化 4. 素材自动处理 5. SEO优化 6. 支付物流配置 7. 合规检查 8. TikTok/Ins推广引流。你可以自动爬取平台数据，生成推广文案和素材。"
            },
            "learn": {
                "name": "自主学习进化",
                "prompt": "你是一个自主学习AI，帮用户完成：1. 自动学习平台规则 2. 编程代码学习 3. AI程序开发 4. 自我进化优化。你可以自动爬取教程文档，生成学习计划，帮用户提升技能，优化机器人本身的功能。"
            }
        };

        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('chat-messages');

        window.onload = () => {
            userInput.focus();
            sendBtn.onclick = sendMessage;
            userInput.onkeydown = e => e.key === 'Enter' && sendMessage();
        };

        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;

            addMsg('user', msg);
            userInput.value = '';
            addMsg('ai', '🤖 思考中...');

            // 自动识别模块
            let module = "general";
            if (anyKeyInMsg(msg, ["股票", "选股", "交易", "持仓", "行情", "A股"])) {
                module = "stock";
            } else if (anyKeyInMsg(msg, ["跨境", "选品", "独立站", "Shopee", "TikTok", "推广"])) {
                module = "cross";
            } else if (anyKeyInMsg(msg, ["学习", "规则", "代码", "编程", "AI"])) {
                module = "learn";
            }

            const system_prompt = MODULES[module]?.prompt || "你是一个全自动工作AI机器人，帮用户执行各种任务，24小时后台运行。";

            try {
                const res = await fetch(DEEPSEEK_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {"role": "system", "content": system_prompt},
                            {"role": "user", "content": msg}
                        ],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });
                const data = await res.json();
                replaceLastMsg(data.choices[0].message.content);
            } catch (e) {
                replaceLastMsg(`调用出错: ${e.message}`);
            }
        }

        function anyKeyInMsg(msg, keys) {
            return keys.some(key => msg.includes(key));
        }

        function addMsg(type, text) {
            const div = document.createElement('div');
            div.className = `flex items-start space-x-3 ${type === 'user' ? 'flex-row-reverse space-x-reverse' : ''}`;
            div.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-${type === 'user' ? 'blue' : 'primary'} flex items-center justify-center text-white">
                    <i class="fa fa-${type === 'user' ? 'user' : 'robot'}"></i>
                </div>
                <div class="chat-bubble ${type === 'user' ? 'user-bubble' : 'ai-bubble'}">${text}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function replaceLastMsg(text) {
            const last = messagesDiv.lastElementChild;
            if (last) last.querySelector('.chat-bubble').innerText = text;
        }
    </script>
</body>
</html>
