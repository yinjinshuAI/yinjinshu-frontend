<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全自动AI工作机器人 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Roboto}
body{background:#0a101f;color:#e6e9ef;padding:20px}
.container{max-width:1000px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#58a6ff;font-size:24px}
.header p{color:#8b949e}

.task-panel{background:#161b22;border-radius:12px;padding:16px;margin-bottom:16px}
.task-title{color:#c9d1d9;font-size:16px;margin-bottom:10px}
.progress-bar{width:100%;height:10px;background:#21262d;border-radius:5px;overflow:hidden}
.progress{height:100%;background:#238636;width:0%;transition:width 0.5s}
.log-box{background:#0d1117;border-radius:8px;padding:12px;margin-top:12px;height:120px;overflow-y:auto;color:#8b949e;font-size:13px;line-height:1.5}

.chat{background:#161b22;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;height:600px}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:14px;max-width:75%;line-height:1.5}
.msg.user{align-self:flex-end;background:#238636;color:white}
.msg.ai{align-self:flex-start;background:#21262d;color:#e6e9ef}

.input-row{display:flex;gap:10px}
#input{flex:1;background:#21262d;border:none;border-radius:24px;padding:12px 16px;color:white;font-size:15px;outline:none}
#send{background:#238636;color:white;border:none;border-radius:24px;padding:12px 20px;font-weight:500;cursor:pointer}
#send:hover{opacity:0.9}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>全自动AI工作机器人 2.0</h1>
    <p>股票｜独立站｜自我进化｜24小时运行</p>
  </div>

  <div class="task-panel">
    <div class="task-title">当前任务：等待指令</div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div class="log-box" id="log">系统启动完成...\n等待你的指令...</div>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="msg ai">你好！我是你的全自动AI工作机器人。
可直接下达任务：
• 股票（A股/美股/港股）全自动化
• 独立站（Shopify/WordPress）全自动化
• 自我学习进化</div>
    </div>
    <div class="input-row">
      <input id="input" placeholder="输入指令...">
      <button id="send">发送</button>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s)
const messages = $('#messages')
const input = $('#input')
const send = $('#send')
const logBox = $('#log')
const progress = $('#progress')

function addMsg(text, isUser = false) {
  const div = document.createElement('div')
  div.className = 'msg ' + (isUser ? 'user' : 'ai')
  div.textContent = text
  messages.appendChild(div)
  messages.scrollTop = messages.scrollHeight
}

function appendLog(text) {
  logBox.innerText += '\n' + text
  logBox.scrollTop = logBox.scrollHeight
}

function setTask(name) {
  document.querySelector('.task-title').innerText = '当前任务：' + name
}

function setProgress(n) {
  progress.style.width = n + '%'
}

// 核心任务执行函数（彻底修复）
async function runAgent(prompt) {
  if (!prompt.trim()) return
  addMsg(prompt, true)
  input.value = ''
  setTask('AI执行中...')
  setProgress(20)
  appendLog(`执行指令：${prompt}`)

  try {
    const response = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    })

    if (!response.ok) {
      throw new Error(`HTTP错误：${response.status}`)
    }

    const data = await response.json()
    setProgress(100)
    setTask(data.task || '任务完成')
    appendLog(`任务完成：${data.task}`)
    addMsg(data.message || '任务执行完成')

  } catch (error) {
    setProgress(0)
    setTask('执行异常')
    appendLog(`执行异常：${error.message}`)
    addMsg(`执行异常：${error.message}`)
  }
}

// 绑定事件
send.onclick = () => runAgent(input.value)
input.addEventListener('keypress', e => e.key === 'Enter' && runAgent(input.value))
</script>
</body>
</html>
