<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yinjinshu - 高端宠物服装AI顾问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 18px;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .feature-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .feature-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 8px;
        }
        .feature-status {
            color: #2f855a;
            font-size: 14px;
        }
        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            color: #2f855a;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background: #48bb78;
            border-radius: 50%;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #f7fafc;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3182ce;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .message.user .message-avatar {
            background: #edf2f7;
            color: #2d3748;
        }
        .message-content {
            background: #e6f2ff;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #f0fff4;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #sendBtn:hover {
            background: #2b6cb0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>全自动AI工作机器人 2.0</h1>
        <p class="subtitle">24小时自动运行 · 股票交易 · 跨境运营 · 自主学习</p>
        
        <div class="features">
            <div class="feature-card">
                <div class="feature-title">股票全自动交易</div>
                <div class="feature-status">已就绪</div>
            </div>
            <div class="feature-card">
                <div class="feature-title">跨境独立站运营</div>
                <div class="feature-status">已就绪</div>
            </div>
            <div class="feature-card">
                <div class="feature-title">自主学习进化</div>
                <div class="feature-status">已就绪</div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <span class="status-dot"></span>
                <span>AI助手在线 已直连DeepSeek API</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">你好！我是你的全自动AI工作机器人，直接输入指令，我会自动执行任务！</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="输入你的问题...">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ====================== 核心API配置（Vercel版，无需修改） ======================
        const API_URL = "/api/chat";
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // 添加消息到聊天框
        function addMessage(sender, content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : ''}`;
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = isUser ? '你' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            if (isUser) {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatarDiv);
            } else {
                messageDiv.appendChild(avatarDiv);
                messageDiv.appendChild(contentDiv);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 发送消息到AI
        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;

            // 添加用户消息
            addMessage('user', msg, true);
            userInput.value = '';

            try {
                // 调用Vercel后端API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: msg
                    })
                });

                if (!response.ok) {
                    throw new Error(`请求失败: ${response.status}`);
                }

                const data = await response.json();
                // 添加AI回复
                const aiReply = data.choices?.[0]?.message?.content || '收到你的消息，后端已连通！';
                addMessage('ai', aiReply);

            } catch (error) {
                addMessage('ai', `发送失败: ${error.message}`);
                console.error('请求错误:', error);
            }
        }

        // 绑定发送事件
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
