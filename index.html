<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的智能员工 - 宠物服装运营助手</title>
<style>
/* 全局样式 - 温馨职场风 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
}

body {
  background: #f5f7fa;
  color: #333;
  padding: 20px;
  line-height: 1.6;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* 员工头像+信息栏 */
.employee-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #764ba2;
}

.employee-info h2 {
  font-size: 20px;
  margin-bottom: 4px;
}

.employee-info p {
  opacity: 0.9;
  font-size: 14px;
}

/* 工作进度面板 */
.progress-panel {
  padding: 20px;
  border-bottom: 1px solid #f0f2f5;
}

.task-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #2d3748;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #f0f2f5;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  width: 0%;
  transition: width 0.8s ease;
  border-radius: 4px;
}

.work-flow {
  color: #4a5568;
  font-size: 13px;
  line-height: 1.8;
  max-height: 80px;
  overflow-y: auto;
}

/* 聊天区域 */
.chat-area {
  height: 500px;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* 消息气泡 - 人性化设计 */
.msg {
  max-width: 80%;
  padding: 14px 18px;
  border-radius: 18px;
  word-wrap: break-word;
  white-space: pre-wrap;
  font-size: 15px;
  position: relative;
}

/* 员工消息（AI） */
.msg.employee {
  align-self: flex-start;
  background: #f0f2f5;
  color: #2d3748;
  border-bottom-left-radius: 4px;
}

/* 老板消息（用户） */
.msg.boss {
  align-self: flex-end;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-bottom-right-radius: 4px;
}

/* 输入区域 */
.input-area {
  padding: 20px;
  border-top: 1px solid #f0f2f5;
  display: flex;
  gap: 12px;
  align-items: center;
}

#commandInput {
  flex: 1;
  padding: 14px 20px;
  border: 1px solid #e2e8f0;
  border-radius: 28px;
  font-size: 15px;
  outline: none;
  transition: all 0.3s ease;
}

#commandInput:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
}

#sendBtn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 28px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.3s ease;
}

#sendBtn:hover {
  opacity: 0.9;
}

/* 滚动条优化 */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: #f0f2f5;
  border-radius: 3px;
}

::-webkit-scrollbar-thumb {
  background: #cbd5e0;
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: #a0aec0;
}
</style>
</head>
<body>
<div class="container">
  <!-- 员工信息头部 -->
  <div class="employee-header">
    <div class="avatar">👩💻</div>
    <div class="employee-info">
      <h2>您的宠物服装运营助理</h2>
      <p>随时为您服务 | 擅长市场调研/运营分析/日常协调</p>
    </div>
  </div>

  <!-- 工作进度面板 -->
  <div class="progress-panel">
    <div class="task-title" id="taskTitle">当前状态：等待老板下达指令</div>
    <div class="progress-bar">
      <div class="progress" id="progressBar"></div>
    </div>
    <div class="work-flow" id="workFlow">
      📝 准备就绪，随时可以开始工作～
    </div>
  </div>

  <!-- 聊天区域 -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <!-- 欢迎消息 -->
      <div class="msg employee">
😘 老板您好！我是您的专属宠物服装运营助理～
我能帮您做这些事：
1. 📊 市场调研：对接行业报告、分析竞品、查平台数据
2. 👩💻 日常运营：做内容、回复客户、安排推广
3. 📏 尺码查询：查宠物服装尺码+库存
4. 🤝 外部协调：对接设计/物流/平台客服

您直接告诉我想做什么，我马上就去执行！
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
      <input 
        type="text" 
        id="commandInput" 
        placeholder="老板请下达指令（例如：帮我调研一下宠物服装市场/开始今天的运营工作）..."
      >
      <button id="sendBtn">发送指令</button>
    </div>
  </div>
</div>

<script>
// DOM元素
const taskTitleEl = document.getElementById('taskTitle');
const progressBarEl = document.getElementById('progressBar');
const workFlowEl = document.getElementById('workFlow');
const messagesEl = document.getElementById('messages');
const commandInputEl = document.getElementById('commandInput');
const sendBtnEl = document.getElementById('sendBtn');

// 添加消息到聊天区
function addMessage(content, isBoss = false) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${isBoss ? 'boss' : 'employee'}`;
  msgDiv.textContent = content;
  messagesEl.appendChild(msgDiv);
  // 自动滚动到底部
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// 更新工作进度
function updateProgress(taskName, percent, flowText = "") {
  taskTitleEl.textContent = `当前状态：${taskName}`;
  progressBarEl.style.width = `${percent}%`;
  
  if (flowText) {
    workFlowEl.textContent += `\n${flowText}`;
    workFlowEl.scrollTop = workFlowEl.scrollHeight;
  }
}

// 重置工作流
function resetWorkFlow() {
  workFlowEl.textContent = "";
  progressBarEl.style.width = "0%";
}

// 核心：发送指令给员工
async function sendCommand(command) {
  if (!command.trim()) {
    addMessage("😯 老板，您还没告诉我要做什么呢～", false);
    return;
  }

  // 添加老板的指令消息
  addMessage(command, true);
  commandInputEl.value = "";

  // 重置工作流
  resetWorkFlow();
  updateProgress("正在接收指令...", 10);

  try {
    // 发送请求给后端
    const response = await fetch('/api/agent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ prompt: command })
    });

    if (!response.ok) {
      throw new Error(`请求失败：${response.status}`);
    }

    const result = await response.json();

    // 实时显示工作步骤
    if (result.taskFlow && result.taskFlow.length > 0) {
      updateProgress(result.task, 20);
      for (const step of result.taskFlow) {
        await new Promise(resolve => setTimeout(resolve, 600));
        updateProgress(result.task, 30 + (result.taskFlow.indexOf(step) * 20), step);
      }
    }

    // 更新最终进度和回复
    updateProgress(result.task, result.progress);
    addMessage(result.message, false);

  } catch (error) {
    updateProgress("工作出错了", 0);
    addMessage(`😥 老板对不起，我工作的时候出了点小差错：${error.message}
您别着急，我马上重新处理您的指令～`, false);
  }
}

// 绑定发送按钮
sendBtnEl.addEventListener('click', () => {
  sendCommand(commandInputEl.value);
});

// 绑定回车发送
commandInputEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendCommand(commandInputEl.value);
  }
});

// 页面加载完成
window.addEventListener('load', () => {
  commandInputEl.focus();
});
</script>
</body>
</html>
