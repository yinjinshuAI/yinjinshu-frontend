<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宠物服装AI运营助手 2.2</title>
<style>
/* 全局样式重置 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", system-ui, sans-serif;
}

/* 主体样式 */
body {
  background: #0f172a;
  color: #f8fafc;
  padding: 20px;
  line-height: 1.6;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

/* 头部样式 */
.header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #1e293b;
}

.header h1 {
  color: #38bdf8;
  font-size: 28px;
  margin-bottom: 8px;
}

.header p {
  color: #94a3b8;
  font-size: 14px;
}

/* 任务面板 */
.task-panel {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.task-title {
  color: #e2e8f0;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #334155;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}

.progress {
  height: 100%;
  background: #10b981;
  width: 0%;
  transition: width 0.8s ease;
  border-radius: 4px;
}

.log-box {
  background: #0f172a;
  border-radius: 8px;
  padding: 12px;
  height: 120px;
  overflow-y: auto;
  color: #94a3b8;
  font-size: 13px;
  white-space: pre-wrap;
  border: 1px solid #334155;
}

/* 聊天区域 */
.chat {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  height: 600px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-right: 8px;
}

/* 消息气泡 */
.msg {
  padding: 14px 18px;
  border-radius: 18px;
  max-width: 80%;
  word-wrap: break-word;
  white-space: pre-wrap;
  font-size: 15px;
}

.msg.user {
  align-self: flex-end;
  background: #10b981;
  color: white;
  border-bottom-right-radius: 4px;
}

.msg.ai {
  align-self: flex-start;
  background: #334155;
  color: #f8fafc;
  border-bottom-left-radius: 4px;
  border-left: 4px solid #38bdf8;
}

/* 输入区域 */
.input-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

#input {
  flex: 1;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 28px;
  padding: 14px 20px;
  color: #f8fafc;
  font-size: 15px;
  outline: none;
  transition: border 0.3s ease;
}

#input:focus {
  border-color: #38bdf8;
  box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
}

#send {
  background: #10b981;
  color: white;
  border: none;
  border-radius: 28px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s ease;
}

#send:hover {
  background: #059669;
}

/* 滚动条样式优化 */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: #1e293b;
  border-radius: 3px;
}

::-webkit-scrollbar-thumb {
  background: #475569;
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: #64748b;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>宠物服装AI运营助手 2.2</h1>
    <p>市场调研 | 股票分析 | 尺码查询 | 独立站运营 | 智能交互</p>
  </div>

  <div class="task-panel">
    <div class="task-title">当前任务：等待指令</div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div class="log-box" id="log">系统启动完成...
等待你的指令（提及"市场/调研/趋势"自动触发市场分析）...</div>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="msg ai">你好！我是你的宠物服装AI运营助手：
🔥 核心功能：提及「市场/调研/分析/趋势/竞品」等关键词，自动生成详细市场报告
• 输入"市场情况" → 宠物服装市场完整分析
• 输入"去工作" → 启动运营（含市场调研）
• 输入"看尺寸" → 宠物服装尺码查询
• 输入"看股票" → 股市分析</div>
    </div>
    <div class="input-row">
      <input id="input" placeholder="请输入指令（例如：市场情况/去工作/看尺寸）...">
      <button id="send">发送</button>
    </div>
  </div>
</div>

<script>
// 快捷选择器
const $ = selector => document.querySelector(selector);

// DOM元素
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#send');
const logBoxEl = $('#log');
const progressEl = $('#progress');
const taskTitleEl = $('.task-title');

// 添加消息到聊天区
function addMessage(text, isUser = false) {
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${isUser ? 'user' : 'ai'}`;
  msgDiv.textContent = text;
  messagesEl.appendChild(msgDiv);
  // 自动滚动到底部
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// 添加日志
function addLog(text) {
  logBoxEl.textContent += '\n' + text;
  logBoxEl.scrollTop = logBoxEl.scrollHeight;
}

// 设置任务标题
function setTaskTitle(title) {
  taskTitleEl.textContent = `当前任务：${title}`;
}

// 设置进度条
function setProgress(percent) {
  progressEl.style.width = `${percent}%`;
}

// 核心执行函数
async function executeCommand(prompt) {
  // 空指令直接返回
  if (!prompt.trim()) return;

  // 添加用户消息
  addMessage(prompt, true);
  // 清空输入框
  inputEl.value = '';

  // 更新状态
  setTaskTitle('AI执行中...');
  setProgress(30);
  addLog(`执行指令：${prompt}`);

  try {
    // 模拟加载过程（更真实）
    await new Promise(resolve => setTimeout(resolve, 800));
    setProgress(70);

    // 发送请求到后端
    const response = await fetch('/api/agent', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ prompt: prompt })
    });

    // 检查响应状态
    if (!response.ok) {
      throw new Error(`HTTP错误：${response.status} ${response.statusText}`);
    }

    // 解析响应数据
    const data = await response.json();
    
    // 更新最终状态
    setProgress(data.progress);
    setTaskTitle(data.task);
    addLog(`任务完成：${data.task}`);
    // 添加AI回复
    addMessage(data.message);

  } catch (error) {
    // 异常处理
    setProgress(0);
    setTaskTitle('执行出错');
    addLog(`执行异常：${error.message}`);
    addMessage(`❌ 系统错误：${error.message}`);
  }
}

// 绑定发送按钮点击事件
sendBtn.addEventListener('click', () => {
  executeCommand(inputEl.value);
});

// 绑定回车发送
inputEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    executeCommand(inputEl.value);
  }
});

// 页面加载完成初始化
window.addEventListener('load', () => {
  setProgress(0);
  setTaskTitle('等待指令');
  addLog('系统初始化完成，提及"市场/调研/趋势"自动触发市场分析');
});
</script>
</body>
</html>
