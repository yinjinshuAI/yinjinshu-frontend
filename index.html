<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全自动AI工作机器人 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Roboto}
body{background:#0a101f;color:#e6e9ef;padding:20px}
.container{max-width:1000px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#58a6ff;font-size:24px}
.header p{color:#8b949e}

.task-panel{background:#161b22;border-radius:12px;padding:16px;margin-bottom:16px}
.task-title{color:#c9d1d9;font-size:16px;margin-bottom:10px}
.progress-bar{width:100%;height:10px;background:#21262d;border-radius:5px;overflow:hidden}
.progress{height:100%;background:#238636;width:0%;transition:width 0.5s}
.log-box{background:#0d1117;border-radius:8px;padding:12px;margin-top:12px;height:120px;overflow-y:auto;color:#8b949e;font-size:13px}

.chat{background:#161b22;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;height:600px}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:14px;max-width:75%}
.msg.user{align-self:flex-end;background:#238636;color:white}
.msg.ai{align-self:flex-start;background:#21262d;color:#e6e9ef}

.input-row{display:flex;gap:10px}
#input{flex:1;background:#21262d;border:none;border-radius:24px;padding:12px 16px;color:white;outline:none}
#send{background:#238636;color:white;border:none;border-radius:24px;padding:12px 20px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>全自动AI工作机器人 2.0</h1>
    <p>股票｜独立站｜自我进化｜24小时运行</p>
  </div>

  <div class="task-panel">
    <div class="task-title">等待指令</div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div class="log-box" id="log">系统启动完成...</div>
  </div>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="msg ai">你好！我是你的全自动AI机器人。
可执行：
• 股票（A股/美股/港股）全自动化
• 独立站（Shopify/WordPress）全自动化
• 自我学习进化</div>
    </div>
    <div class="input-row">
      <input id="input" placeholder="输入指令...">
      <button id="send">发送</button>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s)
const messages = $('#messages')
const input = $('#input')
const send = $('#send')
const logBox = $('#log')
const progress = $('#progress')

function addMsg(text, isUser = false) {
  const div = document.createElement('div')
  div.className = 'msg ' + (isUser ? 'user' : 'ai')
  div.textContent = text
  messages.appendChild(div)
  messages.scrollTop = 9999
}

function log(text) {
  logBox.textContent += '\n' + text
  logBox.scrollTop = 9999
}

function setTask(name) {
  document.querySelector('.task-title').textContent = '任务：' + name
}

function setProgress(p) {
  progress.style.width = p + '%'
}

async function runAgent(prompt) {
  if (!prompt) return
  addMsg(prompt, true)
  input.value = ''
  setTask('AI执行中...')
  setProgress(20)
  log('执行指令：' + prompt)

  try {
    const res = await fetch('/api/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    })
    const data = await res.json()
    setProgress(100)
    setTask(data.task)
    log('任务完成！')
    addMsg(data.message)
  } catch (e) {
    addMsg('执行异常：' + String(e))
  }
}

send.onclick = () => runAgent(input.value.trim())
input.addEventListener('keypress', e => e.key === 'Enter' && runAgent(input.value.trim()))
</script>
</body>
</html>
