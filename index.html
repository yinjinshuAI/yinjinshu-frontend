<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全自动AI工作机器人 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background-color: #f8fafc;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 18px;
        }
        .modules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .module-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .module-card h3 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        .status {
            color: #16a34a;
            font-weight: bold;
            margin-top: 10px;
        }
        .chat-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 25px;
        }
        .chat-status {
            color: #16a34a;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.ai {
            justify-content: flex-start;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #3b82f6;
            flex-shrink: 0;
        }
        .message-content {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #3b82f6;
            color: white;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>全自动AI工作机器人 2.0</h1>
        <p class="subtitle">24小时自动运行 · 股票交易 · 跨境运营 · 自主学习</p>

        <div class="modules">
            <div class="module-card">
                <h3>📈 股票全自动交易</h3>
                <p class="status">已就绪</p>
            </div>
            <div class="module-card">
                <h3>🌐 跨境独立站运营</h3>
                <p class="status">已就绪</p>
            </div>
            <div class="module-card">
                <h3>📚 自主学习进化</h3>
                <p class="status">已就绪</p>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-status">🟢 AI助手在线 已直连DeepSeek API</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="avatar"></div>
                    <div class="message-content">
                        你好！我是你的全自动AI工作机器人，直接输入指令，我会自动执行任务！
                    </div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="输入你的指令...">
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 核心聊天逻辑
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // 发送消息函数
        async function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;

            // 渲染用户消息
            addMessage('user', msg);
            userInput.value = '';

            // 渲染AI思考中
            const aiMsgEl = addMessage('ai', '🤔 思考中...');

            try {
                // 调用后端接口（替换为你的真实CloudBase地址）
                const res = await fetch("https://yinjinshu-8gail7c56b9f87be-1419166396.ap-shanghai.app.tcloudbase.com/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {"role": "system", "content": "你是全自动工作AI机器人，帮用户执行各种任务，24小时后台运行。"},
                            {"role": "user", "content": msg}
                        ]
                    })
                });

                if (!res.ok) throw new Error('API调用失败');
                const data = await res.json();
                // 更新AI消息
                aiMsgEl.querySelector('.message-content').textContent = data.choices[0].message.content;
            } catch (err) {
                aiMsgEl.querySelector('.message-content').textContent = `调用出错: ${err.message}`;
                console.error(err);
            }
        }

        // 添加消息到聊天框
        function addMessage(role, content) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;
            msgEl.innerHTML = `
                <div class="avatar"></div>
                <div class="message-content">${content}</div>
            `;
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgEl;
        }

        // 绑定事件
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
